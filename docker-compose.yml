services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gonga_user
      POSTGRES_PASSWORD: gonga_password
      POSTGRES_DB: gonga_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gonga_user -d gonga_local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  pgdata: